<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Aurum</title>
  <link rel="stylesheet" href="cadastro.css" />
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">

    <div class="brand">
      <div class="brand-mark"><span>B</span></div>
      <span class="brand-name">Buy Happy</span>
    </div>

    <h1 class="heading">Crie sua<br>conta.</h1>
    <p class="subheading">Preencha os dados abaixo para começar.</p>
    <form action="ControleUsuario" method="post">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="João" autocomplete="given-name" />
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            oninput="updateStrength(this.value)"
          />
          <div class="strength-bar" id="strengthBar">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <button type="submit" class="btn-primary">Criar conta</button>

        <p class="footer-link">
          Já tem uma conta? <a href="index.html">Entrar</a>
        </p>
    </form>
  </div>

  <script>
    function updateStrength(val) {
      const bar = document.getElementById('strengthBar');
      bar.className = 'strength-bar';
      if (!val) return;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      if (score) bar.classList.add('s' + score);
    }
  </script>

</body>
</html>
