<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Aurum</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    
    <div class="brand">
      <div class="brand-mark"><span>B</span></div>
      <span class="brand-name">Buy Happy</span>
    </div>

    <h1 class="heading">Bem-vindo<br>de volta.</h1>
    <p class="subheading">Entre com suas credenciais para continuar.</p>
    <form action="ValidarUsuario" method="post">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button type="submit" class="btn-primary">Entrar</button>
        <p class="footer-link">
          Não tem uma conta? <a href="cadastro.html">Criar conta</a>
        </p>
    </form>

  </div>

</body>
</html>
